<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07090f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Marathon" />
  <link rel="manifest" href="/public/manifest.json" />
  <title>Marathon Coach</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #07090f; color: #e2e8f0; font-family: -apple-system, 'Inter', system-ui, sans-serif; min-height: 100vh; max-width: 430px; margin: 0 auto; padding-bottom: 40px; padding-top: env(safe-area-inset-top); }
    button { border: none; cursor: pointer; font-family: inherit; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade { animation: fadeUp 0.35s ease both; }

    .dialog-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: flex-end; justify-content: center;
      z-index: 100; padding: 0 0 env(safe-area-inset-bottom);
      animation: fadeUp 0.2s ease both;
    }
    .dialog-box {
      background: #1e293b; border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px; width: 100%; max-width: 430px;
      border-top: 1px solid #2d3748;
    }
    .dialog-title { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 6px; }
    .dialog-sub { font-size: 12px; color: #4b5563; margin-bottom: 16px; line-height: 1.5; }
    .dialog-textarea {
      width: 100%; background: #0e1118; border: 1px solid #2d3748; border-radius: 12px;
      color: #e2e8f0; font-size: 14px; font-family: inherit; padding: 14px;
      resize: none; outline: none; line-height: 1.5; min-height: 100px;
    }
    .dialog-textarea:focus { border-color: #7c3aed; }
    .dialog-input {
      width: 100%; background: #0e1118; border: 1px solid #2d3748; border-radius: 12px;
      color: #e2e8f0; font-size: 15px; font-family: inherit; padding: 14px;
      outline: none; line-height: 1.5;
    }
    .dialog-input:focus { border-color: #7c3aed; }
    .dialog-actions { display: flex; gap: 10px; margin-top: 12px; }
    .dialog-btn-cancel { flex: 1; padding: 14px; background: transparent; border: 1px solid #2d3748; border-radius: 12px; color: #6b7280; font-size: 14px; font-weight: 600; }
    .dialog-btn-ok { flex: 2; padding: 14px; background: #7c3aed; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; }

    .confirm-box {
      background: #1e293b; border-radius: 20px 20px 0 0;
      padding: 28px 20px 32px; width: 100%; max-width: 430px;
      border-top: 1px solid #2d3748; text-align: center;
    }
    .confirm-icon { font-size: 32px; margin-bottom: 12px; }
    .confirm-title { font-size: 16px; font-weight: 700; color: #e2e8f0; margin-bottom: 8px; }
    .confirm-sub { font-size: 13px; color: #4b5563; margin-bottom: 24px; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 10px; }
    .confirm-btn-cancel { flex: 1; padding: 14px; background: transparent; border: 1px solid #2d3748; border-radius: 12px; color: #6b7280; font-size: 14px; font-weight: 600; }
    .confirm-btn-ok { flex: 1; padding: 14px; background: #ef4444; border-radius: 12px; color: #fff; font-size: 14px; font-weight: 700; }
  </style>
</head>
<body>
<div id="app"></div>
<div id="overlay-root"></div>
<script>
// ─── Objectif ────────────────────────────────────────────────────────────────
const DEFAULT_OBJECTIVE = { distance: "42,2 km", time: "4h00", pace: "5'41\"/km", raceDate: "2026-09-14T08:00:00", raceName: "Marathon de Nice" };

function loadObjective() {
  try { return JSON.parse(localStorage.getItem("mc_objective") || "null") || DEFAULT_OBJECTIVE; }
  catch { return DEFAULT_OBJECTIVE; }
}
function saveObjective(obj) {
  localStorage.setItem("mc_objective", JSON.stringify(obj));
}

function getRaceDate() { return new Date(loadObjective().raceDate || DEFAULT_OBJECTIVE.raceDate); }
const getDays = () => Math.max(0, Math.ceil((getRaceDate() - new Date()) / 86400000));
const getPhase = d => {
  if (d > 63) return { label:"Fondamentaux", color:"#60a5fa", bg:"#0d1f3c" };
  if (d > 35) return { label:"Construction",  color:"#a78bfa", bg:"#1a0f35" };
  if (d > 14) return { label:"Affûtage",      color:"#fbbf24", bg:"#2d1f00" };
  return           { label:"Tapering",        color:"#34d399", bg:"#032118" };
};

const DAYS_FR = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
const FULL_DAYS_FR = ["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
const MONTHS_FR = ["jan","fev","mar","avr","mai","juin","juil","aout","sep","oct","nov","dec"];

// ─── Cache helpers ────────────────────────────────────────────────────────────
function saveCache(result) {
  localStorage.setItem("mc_last_result", JSON.stringify({ result, savedAt: Date.now() }));
}
function loadCache() {
  try { return JSON.parse(localStorage.getItem("mc_last_result") || "null"); } catch { return null; }
}
function saveWeeklyPlan(week) {
  if (week && week.length) localStorage.setItem("mc_weekly_plan", JSON.stringify(week));
}
function loadWeeklyPlan() {
  try { return JSON.parse(localStorage.getItem("mc_weekly_plan") || "null"); } catch { return null; }
}
function saveConfidence(val) {
  if (val !== undefined && val !== null) localStorage.setItem("mc_confidence", String(val));
}
function loadConfidence() {
  const v = localStorage.getItem("mc_confidence");
  return v !== null ? parseInt(v) : null;
}
function saveBilan(result) {
  localStorage.setItem("mc_last_bilan", JSON.stringify({ result, savedAt: Date.now() }));
}
function loadBilan() {
  try { return JSON.parse(localStorage.getItem("mc_last_bilan") || "null"); } catch { return null; }
}
function saveVolumeHistory(data) {
  localStorage.setItem("mc_volume_history", JSON.stringify({ data, savedAt: Date.now() }));
}
function loadVolumeHistory() {
  try {
    const raw = JSON.parse(localStorage.getItem("mc_volume_history") || "null");
    if (!raw) return null;
    const age = Date.now() - raw.savedAt;
    if (age > 24 * 3600 * 1000) return null; // TTL 24h
    return raw.data;
  } catch { return null; }
}

// ─── Prefs ───────────────────────────────────────────────────────────────────
function loadPrefs() {
  try { return JSON.parse(localStorage.getItem("mc_prefs") || "null") || { sessions: 4, days: [0, 2, 4, 5] }; }
  catch { return { sessions: 4, days: [0, 2, 4, 5] }; }
}
function savePrefsData(p) {
  localStorage.setItem("mc_prefs", JSON.stringify(p));
}
function getPrefsPrompt(p) {
  const dayNames = ["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"];
  const selected = [...p.days].sort((a,b)=>a-b).map(d => dayNames[d]).join(", ");
  return "\nPREFERENCES IMPORTANTES - respecter strictement : EXACTEMENT " + p.sessions + " seances de course par semaine (pas plus, pas moins). Jours disponibles pour courir : " + (selected || "non precises") + ". Les autres jours doivent etre Repos ou cross-training. Le champ week[] doit contenir exactement " + p.sessions + " entrees avec une vraie seance de course.";
}

function extractKm(session) {
  if (!session) return '';
  const m = session.match(/(\d+(?:[.,]\d+)?)\s*km/i);
  return m ? m[1] + 'km' : '';
}

// ─── Overlay helpers ──────────────────────────────────────────────────────────
function showOverlay(el) {
  const root = document.getElementById('overlay-root');
  root.innerHTML = '';
  root.appendChild(el);
}
function clearOverlay() {
  const root = document.getElementById('overlay-root');
  root.innerHTML = '';
}

// ─── Dialog commentaire ───────────────────────────────────────────────────────
function showCommentDialog(onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) clearOverlay(); };

  const box = document.createElement('div');
  box.className = 'dialog-box';

  const title = document.createElement('div');
  title.className = 'dialog-title';
  title.textContent = '💬 Ajouter un commentaire';
  const sub = document.createElement('div');
  sub.className = 'dialog-sub';
  sub.textContent = 'Contraintes, fatigue particulière, contexte... Claude en tiendra compte dans l\'analyse.';

  const textarea = document.createElement('textarea');
  textarea.className = 'dialog-textarea';
  textarea.placeholder = 'Ex : J\'ai mal au mollet gauche depuis hier, grosse semaine de travail...';
  textarea.value = localStorage.getItem('mc_pending_comment') || '';

  const actions = document.createElement('div');
  actions.className = 'dialog-actions';

  const btnCancel = document.createElement('button');
  btnCancel.className = 'dialog-btn-cancel';
  btnCancel.textContent = 'Annuler';
  btnCancel.onclick = function() { clearOverlay(); onConfirm(null); };

  const btnOk = document.createElement('button');
  btnOk.className = 'dialog-btn-ok';
  btnOk.textContent = '→ Lancer l\'analyse';
  btnOk.onclick = function() {
    const val = textarea.value.trim();
    localStorage.setItem('mc_pending_comment', val);
    clearOverlay();
    onConfirm(val);
  };

  actions.appendChild(btnCancel);
  actions.appendChild(btnOk);
  box.appendChild(title);
  box.appendChild(sub);
  box.appendChild(textarea);
  box.appendChild(actions);
  overlay.appendChild(box);
  showOverlay(overlay);
  setTimeout(function() { textarea.focus(); }, 100);
}

// ─── Dialog objectif ─────────────────────────────────────────────────────────
function showObjectiveDialog() {
  const obj = loadObjective();
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) clearOverlay(); };

  const box = document.createElement('div');
  box.className = 'dialog-box';

  const title = document.createElement('div');
  title.className = 'dialog-title';
  title.textContent = '🎯 Modifier l\'objectif';

  const sub = document.createElement('div');
  sub.className = 'dialog-sub';
  sub.textContent = 'Les analyses futures tiendront compte du nouvel objectif. Le cache bilan et semaine sera effacé.';

  function field(label, value, placeholder) {
    const wrap = document.createElement('div');
    wrap.style.cssText = 'margin-bottom:12px;';
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:10px;color:#4b5563;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:6px;';
    lbl.textContent = label;
    const inp = document.createElement('input');
    inp.className = 'dialog-input';
    inp.value = value;
    inp.placeholder = placeholder;
    wrap.appendChild(lbl);
    wrap.appendChild(inp);
    return { wrap, inp };
  }

  const fRace  = field('Course', obj.raceName || DEFAULT_OBJECTIVE.raceName, 'Ex: Marathon de Nice');
  const fDate  = field('Date (YYYY-MM-DD)', (obj.raceDate || DEFAULT_OBJECTIVE.raceDate).slice(0, 10), '2026-09-14');
  const fDist  = field('Distance', obj.distance || DEFAULT_OBJECTIVE.distance, 'Ex: 42,2 km');
  const fTime  = field('Temps cible', obj.time || DEFAULT_OBJECTIVE.time, 'Ex: 4h00');
  const fPace  = field('Allure cible', obj.pace || DEFAULT_OBJECTIVE.pace, 'Ex: 5\'41"/km');

  const actions = document.createElement('div');
  actions.className = 'dialog-actions';

  const btnCancel = document.createElement('button');
  btnCancel.className = 'dialog-btn-cancel';
  btnCancel.textContent = 'Annuler';
  btnCancel.onclick = function() { clearOverlay(); };

  const btnOk = document.createElement('button');
  btnOk.className = 'dialog-btn-ok';
  btnOk.textContent = '✓ Sauvegarder';
  btnOk.onclick = function() {
    const dateVal = fDate.inp.value.trim();
    const newObj = {
      raceName: fRace.inp.value.trim() || DEFAULT_OBJECTIVE.raceName,
      raceDate: dateVal ? dateVal + 'T08:00:00' : DEFAULT_OBJECTIVE.raceDate,
      distance: fDist.inp.value.trim() || DEFAULT_OBJECTIVE.distance,
      time: fTime.inp.value.trim() || DEFAULT_OBJECTIVE.time,
      pace: fPace.inp.value.trim() || DEFAULT_OBJECTIVE.pace,
    };
    saveObjective(newObj);
    // Invalider caches dépendants de l'objectif
    localStorage.removeItem('mc_last_bilan');
    localStorage.removeItem('mc_weekly_plan');
    clearOverlay();
    render();
  };

  actions.appendChild(btnCancel);
  actions.appendChild(btnOk);

  box.appendChild(title);
  box.appendChild(sub);
  box.appendChild(fRace.wrap);
  box.appendChild(fDate.wrap);
  box.appendChild(fDist.wrap);
  box.appendChild(fTime.wrap);
  box.appendChild(fPace.wrap);
  box.appendChild(actions);
  overlay.appendChild(box);
  showOverlay(overlay);
}

// ─── Dialog déconnexion ───────────────────────────────────────────────────────
function showDisconnectConfirm() {
  const overlay = document.createElement('div');
  overlay.className = 'dialog-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) clearOverlay(); };

  const box = document.createElement('div');
  box.className = 'confirm-box';

  const icon = document.createElement('div');
  icon.className = 'confirm-icon';
  icon.textContent = '🔌';
  const title = document.createElement('div');
  title.className = 'confirm-title';
  title.textContent = 'Déconnecter Strava ?';
  const sub = document.createElement('div');
  sub.className = 'confirm-sub';
  sub.textContent = 'Ton historique d\'analyse sera effacé. Tu devras te reconnecter pour utiliser l\'app.';

  const actions = document.createElement('div');
  actions.className = 'confirm-actions';

  const btnCancel = document.createElement('button');
  btnCancel.className = 'confirm-btn-cancel';
  btnCancel.textContent = 'Annuler';
  btnCancel.onclick = function() { clearOverlay(); };

  const btnOk = document.createElement('button');
  btnOk.className = 'confirm-btn-ok';
  btnOk.textContent = 'Déconnecter';
  btnOk.onclick = function() {
    clearOverlay();
    localStorage.removeItem('mc_auth');
    localStorage.removeItem('mc_last_result');
    localStorage.removeItem('mc_weekly_plan');
    localStorage.removeItem('mc_confidence');
    localStorage.removeItem('mc_pending_comment');
    localStorage.removeItem('mc_last_bilan');
    localStorage.removeItem('mc_volume_history');
    setState({ auth: null, result: null, view: 'login' });
  };

  actions.appendChild(btnCancel);
  actions.appendChild(btnOk);
  box.appendChild(icon);
  box.appendChild(title);
  box.appendChild(sub);
  box.appendChild(actions);
  overlay.appendChild(box);
  showOverlay(overlay);
}

// ─── State ────────────────────────────────────────────────────────────────────
const cached = loadCache();
let state = {
  view: "home",
  loading: false,
  error: null,
  result: cached ? cached.result : null,
  savedAt: cached ? cached.savedAt : null,
  auth: JSON.parse(localStorage.getItem("mc_auth") || "null"),
};

function setState(patch) { state = { ...state, ...patch }; render(); }

// ─── Auth helpers ─────────────────────────────────────────────────────────────
function saveAuth(auth) { localStorage.setItem("mc_auth", JSON.stringify(auth)); state.auth = auth; }

async function getValidToken() {
  if (!state.auth) return null;
  if (Date.now() / 1000 < state.auth.expires_at - 300) return state.auth.access_token;
  const res = await fetch("/api/refresh", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ refresh_token: state.auth.refresh_token }) });
  const data = await res.json();
  if (data.access_token) { saveAuth({ ...state.auth, ...data }); return data.access_token; }
  return null;
}

function connectStrava() {
  const clientId = "259701";
  const redirect = encodeURIComponent(window.location.origin + "/api/auth");
  window.location.href = "https://www.strava.com/oauth/authorize?client_id=" + clientId + "&redirect_uri=" + redirect + "&response_type=code&scope=activity:read_all";
}

function handleOAuthParams() {
  const params = new URLSearchParams(window.location.search);
  if (params.get("access_token")) {
    saveAuth({ access_token: params.get("access_token"), refresh_token: params.get("refresh_token"), expires_at: parseInt(params.get("expires_at")), athlete_name: params.get("athlete_name") });
    window.history.replaceState({}, "", "/");
  }
}

// ─── Analyze ──────────────────────────────────────────────────────────────────
function analyzeWithComment(mode, extra) {
  showCommentDialog(function(comment) {
    analyze(mode, extra, comment);
  });
}

async function analyze(mode, extra, comment) {
  if (!extra) extra = "";
  if (!comment) comment = "";
  setState({ loading:true, error:null, view:"loading" });
  try {
    const token = await getValidToken();
    if (!token) { setState({ loading:false, view:"login" }); return; }
    const prefs = loadPrefs();
    const prefsPrompt = getPrefsPrompt(prefs);
    const objective = loadObjective();
    const res = await fetch("/api/analyze", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ access_token:token, mode, extra, prefsPrompt, comment, objective }) });
    const data = await res.json();
    if (!res.ok || !data.result) throw new Error(data.error || "Erreur serveur");
    if (data.result._mode === 'bilan') {
      saveBilan(data.result);
      setState({ loading:false, result:data.result, savedAt:Date.now(), view:"bilan" });
    } else {
      if (data.result.week) saveWeeklyPlan(data.result.week);
      if (data.result.confidence !== undefined) saveConfidence(data.result.confidence);
      if (data.weekDoneKm !== undefined) localStorage.setItem('mc_week_done_km', String(data.weekDoneKm));
      saveCache(data.result);
      setState({ loading:false, result:data.result, savedAt:Date.now(), view:"result" });
    }
  } catch(e) { setState({ loading:false, error:e.message, view:"error" }); }
}

// ─── Volume history ───────────────────────────────────────────────────────────
async function fetchVolumeHistory() {
  const cached2 = loadVolumeHistory();
  if (cached2) return cached2;
  const token = await getValidToken();
  if (!token) return null;
  const res = await fetch("/api/analyze", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({ access_token:token, mode:"volume_history" }) });
  const data = await res.json();
  if (data.weekMap) { saveVolumeHistory(data.weekMap); return data.weekMap; }
  return null;
}

// Calcul projection marathon (périodisation standard)
function computeProjection(weekMap) {
  // Semaine en cours (lundi)
  const now = new Date();
  const day = now.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const thisMonday = new Date(now);
  thisMonday.setDate(now.getDate() + diff);
  thisMonday.setHours(0, 0, 0, 0);

  // 12 semaines passées
  const pastWeeks = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(thisMonday);
    d.setDate(thisMonday.getDate() - i * 7);
    const key = d.toISOString().slice(0, 10);
    pastWeeks.push({ key, date: new Date(d), km: weekMap[key] || 0 });
  }

  // Volume de base : moyenne des 4 dernières semaines avec données
  const recentWithData = pastWeeks.filter(w => w.km > 0).slice(-4);
  const baseVolume = recentWithData.length
    ? recentWithData.reduce((s, w) => s + w.km, 0) / recentWithData.length
    : 30;

  // Semaines futures jusqu'au 14 sept
  const raceDate = getRaceDate();
  const futureWeeks = [];
  let w = new Date(thisMonday);
  w.setDate(w.getDate() + 7); // commence semaine prochaine
  let weekIdx = 1;
  while (w < raceDate) {
    const weeksToRace = Math.round((raceDate - w) / (7 * 86400000));
    let volume;
    if (weeksToRace <= 2) {
      volume = baseVolume * 0.4; // taper final
    } else if (weeksToRace === 3) {
      volume = baseVolume * 0.6; // début taper
    } else {
      // Progression +10%/sem, récup toutes les 4 sem (-20%)
      const cycle = weekIdx % 4;
      if (cycle === 0) {
        volume = baseVolume * 0.8;
      } else {
        volume = baseVolume * Math.min(1 + weekIdx * 0.08, 1.5);
      }
    }
    futureWeeks.push({ key: w.toISOString().slice(0, 10), date: new Date(w), km: Math.round(volume * 10) / 10, projected: true });
    w = new Date(w);
    w.setDate(w.getDate() + 7);
    weekIdx++;
  }

  // Projection pour les semaines passées aussi (plan théorique)
  const projectedPast = pastWeeks.map(function(pw, i) {
    const weeksFromStart = i;
    const cycle = weeksFromStart % 4;
    let vol;
    if (cycle === 0 && weeksFromStart > 0) vol = baseVolume * 0.8;
    else vol = baseVolume * Math.min(1 + weeksFromStart * 0.05, 1.4);
    return { ...pw, projectedKm: Math.round(vol * 10) / 10 };
  });

  return { pastWeeks: projectedPast, futureWeeks, baseVolume };
}

// ─── UI helpers ───────────────────────────────────────────────────────────────
const css = s => Object.entries(s).map(([k,v])=>k.replace(/([A-Z])/g,'-$1').toLowerCase()+':'+v).join(';');
function h(tag, attrs) {
  const children = Array.prototype.slice.call(arguments, 2);
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(function(e) {
    const k = e[0], v = e[1];
    if (k==='style' && typeof v==='object') el.style.cssText = css(v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat().forEach(function(c) { if (c) el.appendChild(typeof c==='string' ? document.createTextNode(c) : c); });
  return el;
}

function confidenceColor(v) {
  if (v >= 75) return '#34d399';
  if (v >= 50) return '#fbbf24';
  return '#f87171';
}

// ─── Header ───────────────────────────────────────────────────────────────────
function renderHeader() {
  const days = getDays(), phase = getPhase(days);
  const obj = loadObjective();
  const resultData = state.result || (loadCache() ? loadCache().result : null);
  const next = resultData ? { session: resultData.headline, label: resultData.type, nextDay: resultData.nextDay } : null;
  const confidence = loadConfidence();

  return h('div', {style:{padding:'20px 18px 16px',borderBottom:'1px solid #111827',position:'relative'}},
    h('button', {
      onclick: function() { setState({ view: 'prefs' }); },
      style:{position:'absolute',top:'16px',right:'18px',background:'none',border:'none',color:'#3b4560',fontSize:'18px',cursor:'pointer',zIndex:'10',padding:'4px',lineHeight:'1'}
    }, '⚙️'),
    h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'14px'}},
      h('div', null,
        h('div', {style:{fontSize:'9px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'2.5px',fontWeight:'700',marginBottom:'4px'}}, obj.raceName || 'Marathon de Nice'),
        h('div', {style:{display:'flex',alignItems:'baseline',gap:'8px'}},
          h('span', {style:{fontSize:'40px',fontWeight:'900',color:'#fff',letterSpacing:'-2px',lineHeight:'1'}}, String(days)),
          h('span', {style:{fontSize:'13px',color:'#4b5563',fontWeight:'600'}}, 'jours'))),
      h('div', {style:{display:'flex',alignItems:'center',gap:'7px',background:phase.bg,borderRadius:'20px',padding:'6px 14px',border:'1px solid '+phase.color+'30',marginRight:'32px'}},
        h('div', {style:{width:'6px',height:'6px',borderRadius:'50%',background:phase.color,boxShadow:'0 0 6px '+phase.color}}),
        h('span', {style:{fontSize:'11px',color:phase.color,fontWeight:'700'}}, phase.label))),

    // Objectif modifiable — 3 stats + bouton édition

// ─── Donut SVG ────────────────────────────────────────────────────────────────
function renderDonut(done, total, color) {
  const r = 28, cx = 36, cy = 36, stroke = 6;
  const circ = 2 * Math.PI * r;
  const pct = total > 0 ? Math.min(done / total, 1) : 0;
  const dash = pct * circ;
  const ns = 'http://www.w3.org/2000/svg';

  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', '72');
  svg.setAttribute('height', '72');
  svg.setAttribute('viewBox', '0 0 72 72');

  // Fond
  const bg = document.createElementNS(ns, 'circle');
  bg.setAttribute('cx', cx); bg.setAttribute('cy', cy); bg.setAttribute('r', r);
  bg.setAttribute('fill', 'none');
  bg.setAttribute('stroke', '#1a2035');
  bg.setAttribute('stroke-width', stroke);
  svg.appendChild(bg);

  // Arc progression
  const arc = document.createElementNS(ns, 'circle');
  arc.setAttribute('cx', cx); arc.setAttribute('cy', cy); arc.setAttribute('r', r);
  arc.setAttribute('fill', 'none');
  arc.setAttribute('stroke', color);
  arc.setAttribute('stroke-width', stroke);
  arc.setAttribute('stroke-linecap', 'round');
  arc.setAttribute('stroke-dasharray', dash + ' ' + circ);
  arc.setAttribute('stroke-dashoffset', '0');
  arc.setAttribute('transform', 'rotate(-90 36 36)');
  svg.appendChild(arc);

  // Texte centre
  const txt = document.createElementNS(ns, 'text');
  txt.setAttribute('x', cx); txt.setAttribute('y', cy + 1);
  txt.setAttribute('text-anchor', 'middle');
  txt.setAttribute('dominant-baseline', 'middle');
  txt.setAttribute('fill', '#e2e8f0');
  txt.setAttribute('font-size', '9');
  txt.setAttribute('font-weight', '800');
  txt.setAttribute('font-family', '-apple-system, system-ui, sans-serif');
  txt.textContent = Math.round(done) + '/' + Math.round(total);
  svg.appendChild(txt);

  return svg;
}

// ─── Home ─────────────────────────────────────────────────────────────────────
function renderHome() {
  const name = (state.auth && state.auth.athlete_name) ? state.auth.athlete_name : 'Yann';
  const cache = loadCache();
  const week = loadWeeklyPlan();

  const btns = [
    {id:'session',icon:'⚡',label:'Ma prochaine seance',sub:'Analyse Strava · utilise des tokens'},
    {id:'fatigue',icon:'😮',label:'Je suis fatigue',   sub:'Adapter la charge · utilise des tokens'},
    {id:'cross',  icon:'🚴',label:'Autre sport fait',   sub:'Velo, natation, rando · utilise des tokens'},
    {id:'bilan',  icon:'🔍',label:'Analyse de situation', sub:'Bilan honnete de ta progression · utilise des tokens'},
  ];

  const normalizeRun = function(s) {
    if (!s) return null;
    const sl = s.toLowerCase();
    if (sl.indexOf('fractionn') >= 0 || sl.indexOf('interval') >= 0 || sl.indexOf('vma') >= 0 || sl.indexOf('repet') >= 0) return { label:'Fractionne', color:'#f87171' };
    if (sl.indexOf('tempo') >= 0 || sl.indexOf('seuil') >= 0 || sl.indexOf('allure marathon') >= 0 || sl.indexOf('allure spe') >= 0) return { label:'Tempo', color:'#fbbf24' };
    if (sl.indexOf('sortie longue') >= 0 || sl.indexOf('long run') >= 0 || sl.indexOf(' sl') >= 0) return { label:'Sortie longue', color:'#a78bfa' };
    if (sl.indexOf('footing') >= 0 || sl.indexOf('ef ') >= 0 || sl.indexOf('endurance fond') >= 0 || sl.indexOf('recup') >= 0 || sl.indexOf('regen') >= 0) return { label:'Footing', color:'#60a5fa' };
    return null;
  };

  const children = [
    h('div', {style:{fontSize:'14px',fontWeight:'700',color:'#e2e8f0',marginBottom:'3px'}}, 'Bonjour ' + name + ' 👋'),
    !cache ? h('div', {style:{fontSize:'12px',color:'#4b5563',marginBottom:'16px'}}, 'Lance une analyse pour obtenir ta premiere seance.') : null
  ];

  btns.forEach(function(b) {
    children.push(h('button', {
      onclick: function() {
        if (b.id === 'cross') setState({view:'cross'});
        else analyzeWithComment(b.id);
      },
      style:{width:'100%',display:'flex',alignItems:'center',gap:'14px',background:'#0e1118',border:'1px solid #1a2035',borderRadius:'14px',padding:'16px',marginBottom:'9px',color:'#e2e8f0',textAlign:'left'}},
      h('span', {style:{width:'42px',height:'42px',borderRadius:'12px',background:'#141824',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',flexShrink:'0'}}, b.icon),
      h('div', {style:{flex:'1'}},
        h('div', {style:{fontSize:'14px',fontWeight:'600',marginBottom:'2px'}}, b.label),
        h('div', {style:{fontSize:'11px',color:'#4b5563'}}, b.sub)),
      h('span', {style:{color:'#2d3748',fontSize:'18px'}}, '>')));
  });

  // ── Bloc Ma semaine avec donut ─────────────────────────────────────────────
  if (week) {
    const runs = week.filter(function(w) { return normalizeRun(w.session); });
    if (runs.length) {
      // Volume cible = somme des km du plan
      const targetKm = runs.reduce(function(sum, w) {
        const km = parseFloat((w.distance || extractKm(w.session) || '0').replace(',', '.'));
        return sum + (isNaN(km) ? 0 : km);
      }, 0);

      // Volume effectué cette semaine (depuis lundi)
      const nowW = new Date();
      const dayW = nowW.getDay();
      const diffW = (dayW === 0 ? -6 : 1 - dayW);
      const mondayW = new Date(nowW);
      mondayW.setDate(nowW.getDate() + diffW);
      mondayW.setHours(0, 0, 0, 0);

      // On lit le cache des activités récentes pour estimer le done
      // On stocke le volume effectué cette semaine dans mc_week_done via l'état
      // Ici on utilise une heuristique : semaine = lundi → maintenant
      // Le volume réel n'est pas disponible sans appel Strava supplémentaire
      // → on stocke le volume effectué dans localStorage mc_week_done_km
      // mis à jour lors du dernier appel analyze (on le calcule côté serveur ou on approxime)
      // Pour l'instant : on lit mc_week_done_km s'il existe, sinon 0
      const doneKm = parseFloat(localStorage.getItem('mc_week_done_km') || '0') || 0;

      const cards = runs.map(function(w) {
        const run = normalizeRun(w.session);
        const km = w.distance || extractKm(w.session) || '';
        return h('div', {style:{textAlign:'center',flexShrink:'0',minWidth:'60px'}},
          h('div', {style:{fontSize:'8px',color:'#3b4560',marginBottom:'4px',textTransform:'uppercase',fontWeight:'600'}}, w.day),
          h('div', {style:{borderRadius:'10px',padding:'8px 6px',background:run.color+'15',border:'1px solid '+run.color+'30',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'3px',minHeight:'66px'}},
            h('div', {style:{fontSize:'8px',color:run.color,fontWeight:'800',lineHeight:'1.2',textAlign:'center'}}, run.label),
            km ? h('div', {style:{fontSize:'12px',color:'#e2e8f0',fontWeight:'900',lineHeight:'1',marginTop:'2px'}}, km) : null));
      });

      children.push(
        h('div', {style:{background:'#0e1118',border:'1px solid #1a2035',borderRadius:'14px',padding:'14px 16px',marginBottom:'9px'}},
          h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}},
            h('div', {style:{fontSize:'9px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'2px',fontWeight:'700'}}, 'Ma semaine'),
            targetKm > 0 ? h('div', {style:{display:'flex',alignItems:'center',gap:'10px'}},
              renderDonut(doneKm, targetKm, '#a78bfa'),
              h('div', {style:{textAlign:'right'}},
                h('div', {style:{fontSize:'10px',color:'#a78bfa',fontWeight:'800'}}, Math.round(doneKm) + ' / ' + Math.round(targetKm) + ' km'),
                h('div', {style:{fontSize:'9px',color:'#3b4560',marginTop:'2px'}}, 'effectué'))) : null),
          h.apply(null, ['div', {style:{display:'flex',gap:'6px',overflowX:'auto',paddingBottom:'2px'}}].concat(cards))));
    }
  }

  // Bouton graph volume
  children.push(
    h('button', {
      onclick: function() { setState({ view: 'volume' }); },
      style:{width:'100%',display:'flex',alignItems:'center',gap:'14px',background:'#0e1118',border:'1px solid #1a2035',borderRadius:'14px',padding:'14px 16px',marginBottom:'9px',color:'#e2e8f0',textAlign:'left'}},
      h('span', {style:{width:'42px',height:'42px',borderRadius:'12px',background:'#141824',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',flexShrink:'0'}}, '📊'),
      h('div', {style:{flex:'1'}},
        h('div', {style:{fontSize:'14px',fontWeight:'600',marginBottom:'2px'}}, 'Volume hebdomadaire'),
        h('div', {style:{fontSize:'11px',color:'#4b5563'}}, '12 semaines · projection jusqu\'au 14 sept')),
      h('span', {style:{color:'#2d3748',fontSize:'18px'}}, '>')));

  children.push(h('button', {
    onclick: function() { showDisconnectConfirm(); },
    style:{width:'100%',padding:'12px',background:'transparent',border:'1px dashed #1a2035',borderRadius:'12px',color:'#3b4560',fontSize:'12px',marginTop:'4px'}
  }, 'Deconnecter Strava'));

  return h.apply(null, ['div', {class:'fade',style:{padding:'20px 18px'}}].concat(children));
}

// ─── Volume graph view ────────────────────────────────────────────────────────
function renderVolume() {
  const wrapper = document.createElement('div');
  wrapper.className = 'fade';
  wrapper.style.cssText = 'padding:20px 18px;';

  const nav = h('div', {style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px'}},
    h('button', {onclick:function(){setState({view:'home'});},style:{background:'none',border:'none',color:'#7c3aed',fontSize:'22px',cursor:'pointer',padding:'0',lineHeight:'1'}}, '←'),
    h('div', {style:{fontSize:'16px',fontWeight:'800',color:'#e2e8f0'}}, '📊 Volume hebdomadaire'));
  wrapper.appendChild(nav);

  const chartContainer = document.createElement('div');
  chartContainer.style.cssText = 'background:#0e1118;border:1px solid #1a2035;border-radius:14px;padding:16px;margin-bottom:12px;';

  const loading = document.createElement('div');
  loading.style.cssText = 'text-align:center;padding:40px 0;color:#4b5563;font-size:13px;';
  loading.textContent = 'Chargement des données Strava…';
  chartContainer.appendChild(loading);
  wrapper.appendChild(chartContainer);

  const legend = h('div', {style:{display:'flex',gap:'16px',padding:'0 4px',marginBottom:'12px'}},
    h('div', {style:{display:'flex',alignItems:'center',gap:'6px'}},
      h('div', {style:{width:'12px',height:'12px',borderRadius:'3px',background:'#a78bfa'}}),
      h('div', {style:{fontSize:'11px',color:'#6b7280'}}, 'Volume réel')),
    h('div', {style:{display:'flex',alignItems:'center',gap:'6px'}},
      h('div', {style:{width:'12px',height:'12px',borderRadius:'3px',background:'#2d3748'}}),
      h('div', {style:{fontSize:'11px',color:'#6b7280'}}, 'Volume prévu')));
  wrapper.appendChild(legend);

  const info = h('div', {style:{fontSize:'11px',color:'#2d3748',textAlign:'center',lineHeight:'1.5'}},
    'Données mises en cache 24h · Projection basée sur périodisation marathon standard');
  wrapper.appendChild(info);

  // Charger les données en async
  fetchVolumeHistory().then(function(weekMap) {
    chartContainer.innerHTML = '';
    if (!weekMap) {
      chartContainer.style.cssText += 'text-align:center;padding:40px 0;';
      chartContainer.textContent = 'Impossible de charger les données.';
      return;
    }

    const proj = computeProjection(weekMap);
    const allWeeks = proj.pastWeeks.concat(proj.futureWeeks);
    if (!allWeeks.length) return;

    const maxKm = Math.max(...allWeeks.map(w => Math.max(w.km || 0, w.projectedKm || w.km || 0)), 1);
    const barHeight = 140;

    // Labels mois
    const header = document.createElement('div');
    header.style.cssText = 'display:flex;gap:3px;margin-bottom:4px;overflow:hidden;';

    // Barres
    const barsRow = document.createElement('div');
    barsRow.style.cssText = 'display:flex;align-items:flex-end;gap:3px;height:' + barHeight + 'px;overflow:hidden;';

    // Labels semaine (sous barres)
    const labelsRow = document.createElement('div');
    labelsRow.style.cssText = 'display:flex;gap:3px;margin-top:5px;overflow:hidden;';

    allWeeks.forEach(function(w, i) {
      const isFuture = !!w.projected;
      const km = w.km || 0;
      const projKm = w.projectedKm !== undefined ? w.projectedKm : km;

      // Colonne
      const col = document.createElement('div');
      col.style.cssText = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:' + barHeight + 'px;position:relative;min-width:0;';

      // Barre prévu (gris derrière)
      const projH = Math.round((projKm / maxKm) * barHeight);
      const projBar = document.createElement('div');
      projBar.style.cssText = 'position:absolute;bottom:0;left:0;right:0;height:' + projH + 'px;background:#1e2a40;border-radius:3px 3px 0 0;';
      col.appendChild(projBar);

      // Barre réelle (violet par-dessus) — uniquement passé
      if (!isFuture && km > 0) {
        const realH = Math.round((km / maxKm) * barHeight);
        const realBar = document.createElement('div');
        realBar.style.cssText = 'position:absolute;bottom:0;left:0;right:0;height:' + realH + 'px;background:#7c3aed;border-radius:3px 3px 0 0;';
        col.appendChild(realBar);
      }

      // Semaine courante : bordure accent
      const isCurrentWeek = (i === 11); // 12e semaine passée = semaine en cours
      if (isCurrentWeek) {
        col.style.outline = '1px solid #7c3aed44';
        col.style.borderRadius = '3px';
      }

      barsRow.appendChild(col);

      // Label date
      const d = w.date;
      const lbl = document.createElement('div');
      lbl.style.cssText = 'flex:1;text-align:center;font-size:7px;color:#2d3748;min-width:0;overflow:hidden;';
      // Afficher le mois uniquement au changement de mois
      const prevDate = i > 0 ? allWeeks[i-1].date : null;
      if (!prevDate || prevDate.getMonth() !== d.getMonth()) {
        lbl.textContent = MONTHS_FR[d.getMonth()];
        lbl.style.color = '#4b5563';
      }
      labelsRow.appendChild(lbl);
    });

    // KM max label
    const yLabel = document.createElement('div');
    yLabel.style.cssText = 'font-size:9px;color:#3b4560;text-align:right;margin-bottom:4px;';
    yLabel.textContent = Math.round(maxKm) + ' km max';

    chartContainer.appendChild(yLabel);
    chartContainer.appendChild(barsRow);
    chartContainer.appendChild(labelsRow);

    // Stats résumé
    const realWeeks = proj.pastWeeks.filter(w => w.km > 0);
    const avgKm = realWeeks.length ? Math.round(realWeeks.reduce((s,w)=>s+w.km,0)/realWeeks.length) : 0;
    const maxWeek = realWeeks.length ? Math.round(Math.max(...realWeeks.map(w=>w.km))) : 0;

    const stats = h('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginTop:'14px'}},
      h('div', {style:{background:'#141824',borderRadius:'10px',padding:'10px 8px',textAlign:'center'}},
        h('div', {style:{fontSize:'8px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'4px',fontWeight:'700'}}, 'Moy / sem'),
        h('div', {style:{fontSize:'15px',fontWeight:'800',color:'#a78bfa'}}, avgKm + ' km')),
      h('div', {style:{background:'#141824',borderRadius:'10px',padding:'10px 8px',textAlign:'center'}},
        h('div', {style:{fontSize:'8px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'4px',fontWeight:'700'}}, 'Meilleure sem'),
        h('div', {style:{fontSize:'15px',fontWeight:'800',color:'#60a5fa'}}, maxWeek + ' km')),
      h('div', {style:{background:'#141824',borderRadius:'10px',padding:'10px 8px',textAlign:'center'}},
        h('div', {style:{fontSize:'8px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'4px',fontWeight:'700'}}, 'Base proj.'),
        h('div', {style:{fontSize:'15px',fontWeight:'800',color:'#34d399'}}, Math.round(proj.baseVolume) + ' km')));
    chartContainer.appendChild(stats);
  });

  return wrapper;
}

      btn.textContent = label;
      btn.onclick = function() {
        const idx = draft.days.indexOf(i);
        if (idx >= 0) draft.days.splice(idx, 1);
        else draft.days.push(i);
        buildUI();
      };
      daysRow.appendChild(btn);
    });
    daysBlock.appendChild(daysRow);
    container.appendChild(daysBlock);

    const summary = document.getElementById('prefs-summary');
    if (summary) {
      const dayNames = ["lundi","mardi","mercredi","jeudi","vendredi","samedi","dimanche"];
      const sel = draft.days.slice().sort(function(a,b){return a-b;}).map(function(d){return dayNames[d];});
      summary.textContent = sel.length ? draft.sessions + ' seances · ' + sel.join(', ') : draft.sessions + ' seances · aucun jour selectionne';
    }
  }

  const wrapper = document.createElement('div');
  wrapper.className = 'fade';
  wrapper.style.cssText = 'padding:20px 18px;';

  const nav = document.createElement('div');
  nav.style.cssText = 'display:flex;align-items:center;gap:12px;margin-bottom:20px;';
  const backBtn = document.createElement('button');
  backBtn.textContent = '←';
  backBtn.style.cssText = 'background:none;border:none;color:#7c3aed;font-size:22px;cursor:pointer;padding:0;line-height:1;';
  backBtn.onclick = function() { setState({ view: 'home' }); };
  const title = document.createElement('div');
  title.style.cssText = 'font-size:16px;font-weight:800;color:#e2e8f0;';
  title.textContent = '⚙️ Preferences';
  nav.appendChild(backBtn);
  nav.appendChild(title);
  wrapper.appendChild(nav);

  const container = document.createElement('div');
  container.id = 'prefs-container';
  wrapper.appendChild(container);

  const summary = document.createElement('div');
  summary.id = 'prefs-summary';
  summary.style.cssText = 'font-size:11px;color:#4b5563;text-align:center;margin-bottom:16px;';
  wrapper.appendChild(summary);

  const saveBtn = document.createElement('button');
  saveBtn.textContent = '✓ Sauvegarder';
  saveBtn.style.cssText = 'width:100%;padding:16px;background:#7c3aed;color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;';
  saveBtn.onclick = function() {
    savePrefsData(draft);
    saveBtn.textContent = '✓ Sauvegarde !';
    saveBtn.style.background = '#059669';
    setTimeout(function() { saveBtn.textContent = '✓ Sauvegarder'; saveBtn.style.background = '#7c3aed'; }, 1800);
  };
  wrapper.appendChild(saveBtn);

  const info = document.createElement('div');
  info.style.cssText = 'font-size:11px;color:#2d3748;text-align:center;line-height:1.5;';
  info.textContent = 'Ces preferences sont injectees dans l\'analyse Claude pour personnaliser tes seances.';
  wrapper.appendChild(info);

  setTimeout(buildUI, 0);
  return wrapper;
}

// ─── Login / Loading / Error / Cross ─────────────────────────────────────────
function renderLogin() {
  return h('div', {class:'fade',style:{padding:'40px 18px',textAlign:'center'}},
    h('div', {style:{fontSize:'40px',marginBottom:'16px'}}, '🏃'),
    h('div', {style:{fontSize:'20px',fontWeight:'800',color:'#fff',marginBottom:'8px'}}, 'Marathon Coach'),
    h('div', {style:{fontSize:'13px',color:'#4b5563',marginBottom:'32px',lineHeight:'1.6'}}, 'Connecte ton compte Strava pour des recommandations basees sur tes vraies donnees.'),
    h('button', {onclick:connectStrava,style:{width:'100%',padding:'18px',borderRadius:'14px',background:'#FC4C02',color:'#fff',fontSize:'16px',fontWeight:'700'}}, '🚴 Connecter Strava'));
}

function renderLoading() {
  return h('div', {style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'16px',padding:'60px 18px'}},
    h('div', {style:{width:'44px',height:'44px',borderRadius:'50%',border:'3px solid #1a2035',borderTopColor:'#a78bfa',animation:'spin 0.8s linear infinite'}}),
    h('div', {style:{fontSize:'13px',color:'#4b5563'}}, 'Analyse Strava en cours…'),
    h('div', {style:{fontSize:'11px',color:'#2d3748',marginTop:'4px'}}, 'Connexion a Claude AI'));
}

function renderError() {
  return h('div', {class:'fade',style:{padding:'20px 18px'}},
    h('div', {style:{background:'#1a0a0a',borderRadius:'14px',padding:'20px',border:'1px solid #3a1515',marginBottom:'16px'}},
      h('div', {style:{fontSize:'15px',fontWeight:'700',color:'#f87171',marginBottom:'8px'}}, 'Erreur'),
      h('div', {style:{fontSize:'12px',color:'#6b7280',lineHeight:'1.5',wordBreak:'break-word'}}, state.error)),
    h('button', {onclick:function(){setState({view:'home',error:null});},style:{width:'100%',padding:'15px',borderRadius:'12px',background:'#0e1118',border:'1px solid #1a2035',color:'#e2e8f0',fontSize:'14px',fontWeight:'700'}}, '← Retour'));
}

function renderCross() {
  return h('div', {class:'fade',style:{padding:'20px 18px'}},
    h('div', {style:{fontSize:'14px',fontWeight:'700',color:'#e2e8f0',marginBottom:'4px'}}, '🚴 Quel sport as-tu fait ?'),
    h('div', {style:{fontSize:'12px',color:'#4b5563',marginBottom:'18px'}}, 'Je vais adapter ta prochaine seance.'),
    h('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'16px'}},
      h('button', {onclick:function(){ showCommentDialog(function(c){ analyze('cross','Velo',c); }); },style:{background:'#0e1118',border:'1px solid #1a2035',borderRadius:'14px',padding:'20px 12px',color:'#e2e8f0',textAlign:'center'}}, h('div', {style:{fontSize:'28px',marginBottom:'6px'}}, '🚴'), h('div', {style:{fontSize:'13px',fontWeight:'600'}}, 'Velo')),
      h('button', {onclick:function(){ showCommentDialog(function(c){ analyze('cross','Natation',c); }); },style:{background:'#0e1118',border:'1px solid #1a2035',borderRadius:'14px',padding:'20px 12px',color:'#e2e8f0',textAlign:'center'}}, h('div', {style:{fontSize:'28px',marginBottom:'6px'}}, '🏊'), h('div', {style:{fontSize:'13px',fontWeight:'600'}}, 'Natation')),
      h('button', {onclick:function(){ showCommentDialog(function(c){ analyze('cross','Rando',c); }); },style:{background:'#0e1118',border:'1px solid #1a2035',borderRadius:'14px',padding:'20px 12px',color:'#e2e8f0',textAlign:'center'}}, h('div', {style:{fontSize:'28px',marginBottom:'6px'}}, '🥾'), h('div', {style:{fontSize:'13px',fontWeight:'600'}}, 'Rando')),
      h('button', {onclick:function(){ showCommentDialog(function(c){ analyze('cross','Autre',c); }); },style:{background:'#0e1118',border:'1px solid #1a2035',borderRadius:'14px',padding:'20px 12px',color:'#e2e8f0',textAlign:'center'}}, h('div', {style:{fontSize:'28px',marginBottom:'6px'}}, '⚡'), h('div', {style:{fontSize:'13px',fontWeight:'600'}}, 'Autre'))),
    h('button', {onclick:function(){setState({view:'home'});},style:{width:'100%',padding:'15px',borderRadius:'12px',background:'transparent',border:'1px solid #1a2035',color:'#6b7280',fontSize:'13px'}}, '← Retour'));
}

// ─── Result ───────────────────────────────────────────────────────────────────
function renderResult() {
  const cached2 = loadCache();
  const d = state.result || (cached2 ? cached2.result : null);
  if (!d) return renderHome();
  const cache = loadCache();
  const cacheAge = cache ? Math.round((Date.now() - cache.savedAt) / 3600000) : null;

  const stat = function(label,value,color) {
    return h('div', {style:{background:'#0e1118',borderRadius:'12px',padding:'13px 12px',borderBottom:'2px solid '+color+'35'}},
      h('div', {style:{fontSize:'8px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'5px',fontWeight:'700'}}, label),
      h('div', {style:{fontSize:'16px',fontWeight:'800',color:color,lineHeight:'1'}}, value));
  };

  const row = function(icon,label,val) {
    return h('div', {style:{display:'flex',gap:'10px',marginBottom:'10px',alignItems:'flex-start'}},
      h('span', {style:{fontSize:'14px',flexShrink:'0',marginTop:'1px'}}, icon),
      h('div', null,
        h('span', {style:{fontSize:'8px',color:'#3b4560',fontWeight:'700',textTransform:'uppercase',letterSpacing:'1px'}}, label+' · '),
        h('span', {style:{fontSize:'12px',color:'#6b7280',lineHeight:'1.5'}}, val)));
  };

  const children = [
    cacheAge !== null ? h('div', {style:{fontSize:'10px',color:'#2d3748',marginBottom:'10px',textAlign:'right'}}, 'En cache · il y a '+(cacheAge < 1 ? "moins d'1h" : cacheAge+'h')) : null,
    h('div', {style:{background:'linear-gradient(135deg,#1a0f35,#0d1a35)',borderRadius:'16px',padding:'20px 18px',marginBottom:'10px',border:'1px solid #2a1f4a'}},
      h('div', {style:{fontSize:'9px',color:'#4b5563',textTransform:'uppercase',letterSpacing:'2px',marginBottom:'5px',fontWeight:'700'}}, d.nextDay ? 'Seance recommandee · ' + d.nextDay : 'Seance recommandee'),
      h('div', {style:{fontSize:'24px',fontWeight:'900',color:'#fff',letterSpacing:'-0.5px',marginBottom:'3px'}}, d.headline),
      h('div', {style:{fontSize:'13px',color:'#6b7280'}}, d.type)),
    h('div', {style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'10px'}},
      stat('Distance',d.distance,'#a78bfa'), stat('Allure',d.pace,'#60a5fa'),
      stat('FC cible',d.hr,'#f87171'),       stat('RPE',d.rpe,'#fbbf24')),
    h('div', {style:{background:'#0e1118',borderRadius:'12px',padding:'14px 16px',marginBottom:'10px',borderLeft:'3px solid #fbbf24'}},
      h('div', {style:{fontSize:'8px',color:'#78520a',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'5px',fontWeight:'700'}}, 'Conseil cle'),
      h('div', {style:{fontSize:'13px',color:'#fbbf24',lineHeight:'1.5'}}, d.tip)),
    h('div', {style:{background:'#0e1118',borderRadius:'12px',padding:'14px 16px',marginBottom:'10px'}},
      row('🍌','Avant',d.before), row('💧','Pendant',d.during),
      row('🥛','Apres',d.after), row('👟','Equipement',d.gear))
  ];

  if (d.week) {
    const weekCards = d.week.map(function(w) {
      return h('div', null,
        h('div', {style:{fontSize:'8px',color:'#3b4560',marginBottom:'5px',textTransform:'uppercase',textAlign:'center',fontWeight:'600'}}, w.day),
        h('div', {style:{borderRadius:'7px',padding:'5px 2px',background:(w.color||'#374151')+'18',border:'1px solid '+(w.color||'#374151')+'30',fontSize:'7px',color:w.color||'#374151',fontWeight:'700',minHeight:'34px',display:'flex',alignItems:'center',justifyContent:'center',lineHeight:'1.2',textAlign:'center'}}, w.session));
    });
    children.push(h.apply(null, ['div', {style:{background:'#0e1118',borderRadius:'12px',padding:'14px 16px',marginBottom:'10px'}},
      h('div', {style:{fontSize:'9px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'2px',marginBottom:'12px',fontWeight:'700'}}, 'Bloc semaine'),
      h.apply(null, ['div', {style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'5px'}}].concat(weekCards))
    ]));
  }

  children.push(
    h('div', {style:{background:'#080b10',borderRadius:'12px',padding:'14px 16px',marginBottom:'16px',border:'1px dashed #1a2035'}},
      h('div', {style:{fontSize:'8px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'5px',fontWeight:'700'}}, 'Pourquoi'),
      h('div', {style:{fontSize:'12px',color:'#4b5563',lineHeight:'1.6'}}, d.why)),
    h('button', {onclick:function(){setState({view:'home'});},style:{width:'100%',padding:'15px',borderRadius:'12px',background:'#0e1118',border:'1px solid #1a2035',color:'#6b7280',fontSize:'13px',fontWeight:'600'}}, '← Retour')
  );

  return h.apply(null, ['div', {class:'fade',style:{padding:'20px 18px'}}].concat(children));
}

// ─── Bilan ────────────────────────────────────────────────────────────────────
function renderBilan() {
  const cached3 = loadBilan();
  const d = cached3 ? cached3.result : null;
  if (!d) return renderHome();
  const cacheAge = cached3 ? Math.round((Date.now() - cached3.savedAt) / 3600000) : null;

  const verdictConfig = {
    continuer: { label: 'Continuer sur sub-4h', color: '#34d399', bg: '#032118', icon: '✅' },
    ameliorer:  { label: 'Objectif améliorable', color: '#60a5fa', bg: '#0d1f3c', icon: '🚀' },
    downgrade:  { label: 'Revoir à la baisse',   color: '#f87171', bg: '#1a0505', icon: '⚠️' },
  };
  const verdict = verdictConfig[d.verdict] || verdictConfig.continuer;
  const conf = d.confidence !== undefined ? d.confidence : null;

  function tag(text, color) {
    return h('div', {style:{display:'inline-flex',alignItems:'center',background:color+'18',border:'1px solid '+color+'35',borderRadius:'8px',padding:'6px 10px',fontSize:'12px',color:color,fontWeight:'600',lineHeight:'1.3'}}, text);
  }

  function section(title, items, color) {
    return h('div', {style:{background:'#0e1118',borderRadius:'12px',padding:'14px 16px',marginBottom:'10px'}},
      h('div', {style:{fontSize:'8px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'10px',fontWeight:'700'}}, title),
      h('div', {style:{display:'flex',flexDirection:'column',gap:'7px'}},
        ...(items || []).map(function(item) {
          return h('div', {style:{display:'flex',alignItems:'flex-start',gap:'8px'}},
            h('div', {style:{width:'6px',height:'6px',borderRadius:'50%',background:color,flexShrink:'0',marginTop:'5px'}}),
            h('div', {style:{fontSize:'13px',color:'#c4cdd8',lineHeight:'1.4'}}, item));
        })));
  }

  const children = [
    cacheAge !== null ? h('div', {style:{fontSize:'10px',color:'#2d3748',marginBottom:'10px',textAlign:'right'}}, 'En cache · il y a '+(cacheAge < 1 ? "moins d'1h" : cacheAge+'h')) : null,
    h('div', {style:{background:'linear-gradient(135deg,#1a0f35,#0d1a35)',borderRadius:'16px',padding:'18px',marginBottom:'10px',border:'1px solid #2a1f4a'}},
      h('div', {style:{fontSize:'9px',color:'#4b5563',textTransform:'uppercase',letterSpacing:'2px',marginBottom:'10px',fontWeight:'700'}}, 'Situation actuelle'),
      h('div', {style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
        tag(d.niveau || '–', '#a78bfa'),
        tag(d.tendance || '–', '#60a5fa'))),
    section('✅ Points acquis', d.acquis, '#34d399'),
    section('⚠️ À travailler', d.atravailler, '#fbbf24'),
    section('🎯 Priorités des 4 prochaines semaines', d.priorites, '#a78bfa'),
    h('div', {style:{background:verdict.bg,borderRadius:'12px',padding:'16px',marginBottom:'10px',border:'1px solid '+verdict.color+'40'}},
      h('div', {style:{fontSize:'8px',color:verdict.color+'99',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'6px',fontWeight:'700'}}, 'Verdict objectif'),
      h('div', {style:{fontSize:'14px',fontWeight:'800',color:verdict.color,marginBottom:'8px'}}, verdict.icon + ' ' + verdict.label),
      h('div', {style:{fontSize:'12px',color:'#6b7280',lineHeight:'1.6'}}, d.verdictDetail)),
    conf !== null ? h('div', {style:{background:'#0e1118',borderRadius:'12px',padding:'14px 16px',marginBottom:'10px',display:'flex',alignItems:'center',gap:'12px'}},
      h('div', {style:{flex:'1'}},
        h('div', {style:{fontSize:'8px',color:'#3b4560',textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:'6px',fontWeight:'700'}}, 'Indice de confiance'),
        h('div', {style:{height:'4px',background:'#1a2035',borderRadius:'2px',overflow:'hidden'}},
          h('div', {style:{height:'100%',width:conf+'%',background:confidenceColor(conf),borderRadius:'2px'}}))),
      h('div', {style:{fontSize:'20px',fontWeight:'900',color:confidenceColor(conf),minWidth:'44px',textAlign:'right'}}, conf+'/100')) : null,
    h('button', {onclick:function(){setState({view:'home'});},style:{width:'100%',padding:'15px',borderRadius:'12px',background:'#0e1118',border:'1px solid #1a2035',color:'#6b7280',fontSize:'13px',fontWeight:'600'}}, '← Retour')
  ];

  return h.apply(null, ['div', {class:'fade',style:{padding:'20px 18px'}}].concat(children));
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  app.appendChild(renderHeader());
  const views = { home:renderHome, login:renderLogin, loading:renderLoading, error:renderError, cross:renderCross, result:renderResult, prefs:renderPrefs, bilan:renderBilan, volume:renderVolume };
  app.appendChild((views[state.view]||renderHome)());
}

// ─── Init ─────────────────────────────────────────────────────────────────────
handleOAuthParams();
if (!state.auth) state.view = 'login';
render();
</script>
